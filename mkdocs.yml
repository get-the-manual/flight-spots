site_name: Flight Spots
site_url: https://get-the-manual.github.io/flight-spots/
site_description: >-
  Flight Spots.

# Repository
repo_name: get-the-manual/flight-spots
repo_url: https://github.com/get-the-manual/flight-spots
edit_uri: edit/main/docs/

plugins:
  - search
  - autorefs
  - git-revision-date-localized:
      enable_creation_date: true
markdown_extensions:
  - attr_list
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.action.view
    - content.action.edit
  icon:
    edit: material/pencil 
    view: material/eye

extra:
  # analytics:
      # provider: google
      # property: G-85LR0ZS5R5
  consent:
    title: Cookie consent
    description: >-
      We use cookies for analytics. By clicking “Accept,” you help us improve our documentation.

nav:
  - Main Page: index.md
  - Estonia:
    - Drones: Estonia/Drones.md
    - Whoops: Estonia/Whoops.md